<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simply Fit AI — Your Coach</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #0E0E0E; color: #F0EDE8; height: 100vh; display: flex; flex-direction: column; }

    .header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid #1A1A1A;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .logo-mark { width: 30px; height: 30px; background: #C8F135; border-radius: 7px; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 16px; color: #0E0E0E; }
    .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 0.06em; }
    .logo-text span { color: #C8F135; }
    .badge { margin-left: auto; font-size: 0.68rem; color: #C8F135; letter-spacing: 0.08em; text-transform: uppercase; background: rgba(200,241,53,0.08); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(200,241,53,0.2); }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .msg { display: flex; align-items: flex-end; gap: 8px; }
    .msg.user { flex-direction: row-reverse; }
    .av { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 12px; font-weight: 500; }
    .av.ai { background: #C8F135; color: #0E0E0E; font-family: 'Bebas Neue', sans-serif; font-size: 14px; }
    .av.me { background: #1E1E1E; color: #666; }
    .bubble { max-width: 78%; padding: 11px 15px; border-radius: 18px; font-size: 0.85rem; line-height: 1.6; }
    .ai .bubble { background: #141414; color: #CCC; border: 1px solid #222; border-bottom-left-radius: 4px; }
    .user .bubble { background: #C8F135; color: #0E0E0E; border-bottom-right-radius: 4px; font-weight: 500; }

    .input-area {
      padding: 1rem 1.5rem;
      border-top: 1px solid #1A1A1A;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 50px;
      border: 1px solid #222;
      background: #141414;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      color: #F0EDE8;
      outline: none;
    }
    .chat-input::placeholder { color: #444; }
    .send-btn {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #C8F135;
      border: none;
      cursor: pointer;
      color: #0E0E0E;
      font-size: 18px;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }

    .typing-dot { display: inline-block; width: 5px; height: 5px; background: #444; border-radius: 50%; animation: blink 1.2s infinite; margin: 0 1px; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 1.5rem 1rem;
    }
    .suggestion {
      padding: 7px 14px;
      border: 1px solid #222;
      border-radius: 50px;
      font-size: 0.75rem;
      color: #666;
      cursor: pointer;
      background: #141414;
    }
    .suggestion:hover { border-color: #C8F135; color: #C8F135; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo-mark">SF</div>
    <div class="logo-text">SIMPLY FIT <span>AI</span></div>
    <div class="badge">✦ Unlimited Access</div>
  </div>

  <div class="messages" id="messages">
    <div class="msg ai">
      <div class="av ai">SF</div>
      <div class="bubble">Welcome! 💪 I'm your Simply Fit AI coach with unlimited access. Ask me anything about training, nutrition, recovery, or your fitness goals — I'm here 24/7. What are we working on today?</div>
    </div>
  </div>

  <div class="suggestions" id="suggestions">
    <div class="suggestion" onclick="quickAsk('Build me a 3 day workout plan')">3 day workout plan</div>
    <div class="suggestion" onclick="quickAsk('How much protein do I need?')">How much protein?</div>
    <div class="suggestion" onclick="quickAsk('How do I lose belly fat?')">Lose belly fat</div>
    <div class="suggestion" onclick="quickAsk('Best exercises for bigger arms')">Bigger arms</div>
  </div>

  <div class="input-area">
    <input class="chat-input" id="chatInput" placeholder="Ask your coach anything..." />
    <button class="send-btn" onclick="sendMessage()">↑</button>
  </div>

<script>
  let history = [];
let profile = {};

function extractProfile(message) {
  const lower = message.toLowerCase();
  if (lower.includes('bodyweight') || lower.includes('no equipment') || lower.includes('no gym')) profile.equipment = 'bodyweight only';
  if (lower.includes('dumbbells')) profile.equipment = 'dumbbells available';
  if (lower.includes('gym')) profile.equipment = 'gym access';
  if (lower.includes('lose weight') || lower.includes('fat loss') || lower.includes('lose fat')) profile.goal = 'fat loss';
  if (lower.includes('build muscle') || lower.includes('gain muscle') || lower.includes('bulk')) profile.goal = 'muscle building';
  if (lower.includes('get stronger') || lower.includes('strength')) profile.goal = 'strength';
  if (lower.includes('beginner') || lower.includes('just started')) profile.level = 'beginner';
  if (lower.includes('intermediate')) profile.level = 'intermediate';
  if (lower.includes('advanced')) profile.level = 'advanced';
  if (lower.includes('vegan')) profile.diet = 'vegan';
  if (lower.includes('vegetarian')) profile.diet = 'vegetarian';
  if (lower.match(/(\d+) days a week/)) profile.schedule = lower.match(/(\d+) days a week/)[0];
  if (lower.includes('injury') || lower.includes('bad knee') || lower.includes('bad back') || lower.includes('bad shoulder')) profile.injuries = message;
}

  document.getElementById('chatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendMessage();
  });

  function quickAsk(text) {
    document.getElementById('chatInput').value = text;
    sendMessage();
    document.getElementById('suggestions').style.display = 'none';
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;

    const msgs = document.getElementById('messages');
    appendMsg(msgs, 'user', text);
    input.value = '';
    extractProfile(text);
    history.push({ role: 'user', content: text });
    document.getElementById('suggestions').style.display = 'none';

    const typing = appendMsg(msgs, 'ai', '');
    typing.querySelector('.bubble').innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
    msgs.scrollTop = msgs.scrollHeight;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history: history.slice(-10), profile })
      });
      const data = await res.json();
      const formatted = data.reply
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/#{1,6} /g, '')
        .replace(/\n/g, '<br>');
      typing.querySelector('.bubble').innerHTML = formatted;
      history.push({ role: 'assistant', content: data.reply });
    } catch {
      typing.querySelector('.bubble').textContent = 'Something went wrong — please try again.';
    }
    msgs.scrollTop = msgs.scrollHeight;
  }

  function appendMsg(container, role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : 'ai'}`;
    div.innerHTML = role === 'user'
      ? `<div class="av me">U</div><div class="bubble">${text}</div>`
      : `<div class="av ai">SF</div><div class="bubble">${text}</div>`;
    container.appendChild(div);
    return div;
  }
</script>
</body>
</html>
